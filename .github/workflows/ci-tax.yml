name: CI Tax Service

on:
  push:
    branches:
      - "**"
    paths:
      - "tax/**"
      - "common-library/**"
      - "pom.xml"
      - ".github/workflows/ci-tax.yml"

jobs:
  build-and-push-tax:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ynnhi2607/yas-tax-service

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Change Java version from 25 to 21
        run: |
          sed -i 's/<java.version>25<\/java.version>/<java.version>21<\/java.version>/' pom.xml
          sed -i 's/<maven.compiler.source>25<\/maven.compiler.source>/<maven.compiler.source>21<\/maven.compiler.source>/' pom.xml
          sed -i 's/<maven.compiler.target>25<\/maven.compiler.target>/<maven.compiler.target>21<\/maven.compiler.target>/' pom.xml
          find . -maxdepth 2 -name Dockerfile -exec sed -i 's/eclipse-temurin:25-jre-alpine/eclipse-temurin:21-jre-alpine/g' {} \;

      - name: Build tax service jar
        run: mvn -pl tax -am clean package -DskipTests

      - name: Get short commit id
        id: vars
        run: echo "commit_id=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ steps.vars.outputs.commit_id }} tax

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: docker push $IMAGE_NAME:${{ steps.vars.outputs.commit_id }}
