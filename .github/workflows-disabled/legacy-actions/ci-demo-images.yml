name: CI Demo Images

on:
  push:
    branches:
      - "**"
    paths:
      - "common-library/**"
      - "pom.xml"
      - "product/**"
      - "cart/**"
      - "order/**"
      - "customer/**"
      - "inventory/**"
      - "tax/**"
      - "media/**"
      - "search/**"
      - "storefront-bff/**"
      - "backoffice-bff/**"
      - "sampledata/**"
      - "storefront/**"
      - "backoffice/**"
      - ".github/workflows/ci-demo-images.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: product
            type: backend
            context: product
            image: yas-product
          - service: cart
            type: backend
            context: cart
            image: yas-cart
          - service: order
            type: backend
            context: order
            image: yas-order
          - service: customer
            type: backend
            context: customer
            image: yas-customer
          - service: inventory
            type: backend
            context: inventory
            image: yas-inventory
          - service: tax
            type: backend
            context: tax
            image: yas-tax
          - service: media
            type: backend
            context: media
            image: yas-media
          - service: search
            type: backend
            context: search
            image: yas-search
          - service: storefront-bff
            type: backend
            context: storefront-bff
            image: yas-storefront-bff
          - service: backoffice-bff
            type: backend
            context: backoffice-bff
            image: yas-backoffice-bff
          - service: sampledata
            type: backend
            context: sampledata
            image: yas-sampledata
          - service: storefront-ui
            type: ui
            context: storefront
            image: yas-storefront
          - service: backoffice-ui
            type: ui
            context: backoffice
            image: yas-backoffice

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Get short commit id
        id: vars
        run: echo "commit_id=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Java 21
        if: matrix.type == 'backend'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Keep backend build on Java 21
        if: matrix.type == 'backend'
        run: |
          sed -i 's/<java.version>25<\/java.version>/<java.version>21<\/java.version>/' pom.xml
          sed -i 's/<maven.compiler.source>25<\/maven.compiler.source>/<maven.compiler.source>21<\/maven.compiler.source>/' pom.xml
          sed -i 's/<maven.compiler.target>25<\/maven.compiler.target>/<maven.compiler.target>21<\/maven.compiler.target>/' pom.xml
          find . -maxdepth 2 -name Dockerfile -exec sed -i 's/eclipse-temurin:25-jre-alpine/eclipse-temurin:21-jre-alpine/g' {} \;

      - name: Build backend jar
        if: matrix.type == 'backend'
        run: mvn -pl ${{ matrix.service }} -am clean package -DskipTests

      - name: Prepare Docker tags
        id: docker_tags
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          COMMIT_ID: ${{ steps.vars.outputs.commit_id }}
        run: |
          tags="${IMAGE}:${COMMIT_ID}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags},${IMAGE}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
